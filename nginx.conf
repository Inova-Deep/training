server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                     always;
    add_header X-Content-Type-Options   "nosniff"                        always;
    add_header X-XSS-Protection         "1; mode=block"                  always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;

    # ── Static assets — cache aggressively ────────────────────────────────────
    # Vite outputs files with content hashes in the name, so 1-year cache is safe
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── index.html — never cache ───────────────────────────────────────────────
    # Ensures users always load the latest shell on deploy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── API proxy — avoids CORS by forwarding server-side ──────────────────────
    location /api/ {
        proxy_pass          https://dmlapi.inova.krd/api/;
        proxy_http_version  1.1;
        proxy_ssl_server_name on;
        proxy_ssl_verify    off;
        proxy_set_header    Host              dmlapi.inova.krd;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    # Vue Router uses history mode — all paths must resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
